<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKAY — Live Sports Predictions</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--yellow:#FFE500;--orange:#FF5C00;--red:#FF1744;--green:#00E676;--black:#080808;--white:#FFFFFF;--gray:#141414;--card:#1A1A1A;--border:#2A2A2A;--muted:#666}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--black);color:var(--white);font-family:'Space Grotesk',sans-serif;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--yellow);border-radius:2px}
.ticker{background:var(--yellow);padding:7px 0;overflow:hidden;white-space:nowrap}
.ticker-track{display:inline-flex;gap:80px;animation:tick 30s linear infinite}
.ticker-track span{font-family:'DM Mono',monospace;font-size:12px;font-weight:600;color:var(--black)}
@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}
nav{position:fixed;top:28px;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:14px 32px;background:rgba(8,8,8,0.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--yellow);letter-spacing:6px;animation:glow 2.5s ease-in-out infinite}
@keyframes glow{0%,100%{text-shadow:0 0 20px rgba(255,229,0,0.4)}50%{text-shadow:0 0 50px rgba(255,229,0,0.8)}}
.nav-pills{display:flex;gap:4px;background:var(--gray);padding:4px;border-radius:14px}
.nav-pill{padding:8px 18px;border-radius:10px;border:none;background:transparent;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s}
.nav-pill.active{background:var(--yellow);color:var(--black)}
.page{display:none;padding:90px 24px 60px;max-width:1300px;margin:0 auto}
.page.active{display:block}
.hero{padding:120px 24px 48px;text-align:center;position:relative;overflow:hidden}
.hero::after{content:'OKAY';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Bebas Neue',sans-serif;font-size:500px;color:rgba(255,229,0,0.025);pointer-events:none;white-space:nowrap}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:var(--orange);color:#fff;font-size:11px;font-weight:700;letter-spacing:3px;padding:7px 18px;border-radius:100px;margin-bottom:28px}
.live-dot{width:7px;height:7px;background:#fff;border-radius:50%;animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(64px,10vw,130px);line-height:0.88;letter-spacing:4px;margin-bottom:22px}
.hero h1 em{color:var(--yellow);font-style:normal}
.hero p{font-size:17px;color:var(--muted);max-width:480px;margin:0 auto 44px;line-height:1.65}
.sport-filter{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.sf-btn{padding:10px 22px;border-radius:100px;border:2px solid var(--border);background:transparent;color:var(--white);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s}
.sf-btn:hover,.sf-btn.active{border-color:var(--yellow);background:var(--yellow);color:var(--black);transform:translateY(-2px)}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:36px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;text-align:center}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--yellow);letter-spacing:2px;line-height:1}
.stat-lbl{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-top:4px}
.day-tabs{display:flex;gap:8px;margin-bottom:28px}
.day-tab{padding:10px 24px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s}
.day-tab.active{background:var(--yellow);border-color:var(--yellow);color:var(--black)}
.main-layout{display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start}
.matches-wrap{display:flex;flex-direction:column;gap:14px}
.match-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden}
.match-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--yellow),var(--orange));transform:scaleX(0);transition:transform 0.3s;transform-origin:left}
.match-card:hover{border-color:#333;transform:translateY(-3px);box-shadow:0 16px 48px rgba(0,0,0,0.6)}
.match-card:hover::before,.match-card.selected::before{transform:scaleX(1)}
.match-card.selected{border-color:var(--yellow);background:rgba(255,229,0,0.04)}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-league{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--orange);text-transform:uppercase;display:flex;align-items:center;gap:8px}
.card-league img{width:18px;height:18px;object-fit:contain}
.card-time{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)}
.card-teams{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.team{display:flex;align-items:center;gap:10px;flex:1}
.team.away{flex-direction:row-reverse;text-align:right}
.team img{width:36px;height:36px;object-fit:contain}
.team-name{font-size:14px;font-weight:700}
.score-box{text-align:center;padding:0 16px}
.score{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:4px}
.vs-text{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--border);letter-spacing:2px}
.live-badge{display:inline-flex;align-items:center;gap:5px;background:var(--red);color:#fff;font-size:10px;font-weight:700;letter-spacing:2px;padding:3px 10px;border-radius:100px}
.live-badge .dot{width:6px;height:6px;background:#fff;border-radius:50%;animation:blink 1s ease-in-out infinite}
.card-odds{display:flex;gap:8px;margin-bottom:14px}
.odd-btn{flex:1;padding:10px 6px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.03);color:var(--white);font-family:'DM Mono',monospace;font-size:14px;cursor:pointer;transition:all 0.2s;text-align:center}
.odd-btn small{display:block;font-size:10px;color:var(--muted);font-family:'Space Grotesk',sans-serif;margin-bottom:2px}
.odd-btn:hover{border-color:var(--yellow);color:var(--yellow)}
.odd-btn.picked{background:var(--yellow);color:var(--black);border-color:var(--yellow);font-weight:700}
.odd-btn.picked small{color:rgba(0,0,0,0.55)}
.prediction-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:rgba(0,230,118,0.07);border:1px solid rgba(0,230,118,0.18);border-radius:10px;font-size:12px;color:var(--green);font-weight:600}
.loading-state{text-align:center;padding:60px 20px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--yellow);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state p,.empty-state{color:var(--muted);font-size:14px;text-align:center;padding:60px 20px}
.slip{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;position:sticky;top:88px}
.slip-head{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--yellow);margin-bottom:4px}
.slip-sub{font-size:12px;color:var(--muted);margin-bottom:20px}
.slip-sub span{color:var(--yellow);font-weight:700}
.slip-list{min-height:100px;margin-bottom:16px}
.slip-empty-msg{text-align:center;padding:30px 0;color:var(--muted);font-size:13px;line-height:1.6}
.slip-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.slip-item-name{font-size:12px;font-weight:700;margin-bottom:2px}
.slip-item-pick{font-size:11px;color:var(--muted)}
.slip-item-right{display:flex;align-items:center;gap:8px}
.slip-item-odd{font-family:'DM Mono',monospace;font-size:13px;color:var(--yellow);font-weight:600}
.slip-remove{background:none;border:none;color:var(--border);cursor:pointer;font-size:14px;transition:color 0.2s;padding:2px 4px}
.slip-remove:hover{color:var(--red)}
.slip-totals{background:rgba(255,255,255,0.03);border-radius:12px;padding:14px;margin-bottom:14px}
.slip-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:13px}
.slip-row:last-child{margin-bottom:0}
.slip-row .lbl{color:var(--muted)}
.slip-row .val{font-family:'DM Mono',monospace;font-weight:600}
.slip-row.big .val{color:var(--yellow);font-size:20px;font-family:'Bebas Neue',sans-serif}
.stake-input{background:none;border:none;color:var(--white);font-family:'DM Mono',monospace;font-size:14px;width:110px;text-align:right;outline:none}
.place-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--yellow),var(--orange));border:none;border-radius:13px;color:var(--black);font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;cursor:pointer;transition:all 0.2s}
.place-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(255,92,0,0.4)}
.place-btn:disabled{opacity:0.3;cursor:not-allowed;transform:none}
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.calc-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px}
.calc-card h3{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--yellow);margin-bottom:20px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.field input{width:100%;padding:13px 15px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;color:var(--white);font-family:'DM Mono',monospace;font-size:16px;outline:none;transition:border-color 0.2s}
.field input:focus{border-color:var(--yellow)}
.result-box{background:linear-gradient(135deg,var(--yellow),var(--orange));border-radius:14px;padding:22px;text-align:center;margin-top:20px}
.result-box .r-lbl{font-size:11px;font-weight:700;letter-spacing:2px;color:rgba(0,0,0,0.55);text-transform:uppercase;margin-bottom:6px}
.result-box .r-val{font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--black);letter-spacing:2px;line-height:1}
.result-box .r-sub{font-size:13px;color:rgba(0,0,0,0.55);margin-top:4px;font-family:'DM Mono',monospace}
.guide-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.guide-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:26px;cursor:pointer;transition:all 0.25s}
.guide-card:hover{border-color:var(--yellow);transform:translateY(-4px)}
.guide-icon{font-size:44px;margin-bottom:14px}
.guide-card h3{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--yellow);margin-bottom:8px}
.guide-card p{font-size:13px;color:var(--muted);line-height:1.6}
.guide-detail{display:none;background:var(--card);border:1px solid var(--yellow);border-radius:20px;padding:32px;margin-top:20px}
.guide-detail.open{display:block}
.guide-detail h2{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:3px;color:var(--yellow);margin-bottom:12px}
.guide-detail p{color:var(--muted);font-size:14px;line-height:1.7;margin-bottom:14px}
.bet-list{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.bet-item{background:rgba(255,255,255,0.03);border-left:4px solid var(--orange);border-radius:0 12px 12px 0;padding:14px 18px}
.bet-item h4{font-weight:700;font-size:14px;margin-bottom:5px}
.bet-item p{font-size:13px;color:var(--muted);margin:0}
.back-btn{margin-top:20px;padding:11px 22px;background:none;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:13px;cursor:pointer;transition:all 0.2s}
.back-btn:hover{border-color:var(--white);color:var(--white)}
.chat-layout{display:grid;grid-template-columns:1fr 300px;gap:20px}
.chat-box{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;display:flex;flex-direction:column;height:620px}
.chat-hdr{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.chat-hdr-dot{width:10px;height:10px;background:var(--green);border-radius:50%;animation:blink 1.5s ease-in-out infinite}
.chat-hdr h3{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px}
.chat-hdr span{font-size:12px;color:var(--green)}
.chat-msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
.msg{max-width:86%;animation:msgIn 0.3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.ai{align-self:flex-start}.msg.user{align-self:flex-end}
.msg-who{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--muted);margin-bottom:5px}
.msg.user .msg-who{text-align:right;color:var(--orange)}
.msg-bubble{padding:12px 15px;border-radius:16px;font-size:14px;line-height:1.6}
.msg.ai .msg-bubble{background:rgba(255,255,255,0.05);border-bottom-left-radius:4px}
.msg.user .msg-bubble{background:linear-gradient(135deg,var(--yellow),var(--orange));color:var(--black);font-weight:600;border-bottom-right-radius:4px}
.typing{display:flex;gap:5px;padding:12px 15px;background:rgba(255,255,255,0.05);border-radius:16px;border-bottom-left-radius:4px;width:fit-content}
.t-dot{width:8px;height:8px;background:var(--muted);border-radius:50%;animation:tdot 1.2s ease-in-out infinite}
.t-dot:nth-child(2){animation-delay:0.2s}.t-dot:nth-child(3){animation-delay:0.4s}
@keyframes tdot{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px);background:var(--yellow)}}
.chat-inp-row{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:10px}
.chat-inp{flex:1;padding:12px 15px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:12px;color:var(--white);font-family:'Space Grotesk',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s}
.chat-inp:focus{border-color:var(--yellow)}
.send-btn{padding:12px 20px;background:var(--yellow);border:none;border-radius:12px;color:var(--black);font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;cursor:pointer;transition:all 0.2s}
.send-btn:hover{background:var(--orange);color:var(--white)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed}
.quick-panel{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:22px}
.quick-panel h3{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--yellow);margin-bottom:14px}
.q-btn{display:block;width:100%;text-align:left;padding:11px 13px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;color:var(--white);font-family:'Space Grotesk',sans-serif;font-size:12px;cursor:pointer;transition:all 0.2s;margin-bottom:7px;line-height:1.4}
.q-btn:hover{border-color:var(--yellow);color:var(--yellow)}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:3px;color:var(--yellow);margin-bottom:6px}
.page-sub{color:var(--muted);font-size:14px;margin-bottom:32px}
@media(max-width:900px){.main-layout{grid-template-columns:1fr}.stats-bar{grid-template-columns:repeat(2,1fr)}.calc-grid{grid-template-columns:1fr}.chat-layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="ticker"><div class="ticker-track" id="ticker-track"><span>🔥 Loading live data...</span><span>🔥 Loading live data...</span></div></div>
<nav>
<div class="logo">OKAY</div>
<div class="nav-pills">
<button class="nav-pill active" onclick="showPage('home',this)">Predictions</button>
<button class="nav-pill" onclick="showPage('calculator',this)">Calculator</button>
<button class="nav-pill" onclick="showPage('guides',this)">Guides</button>
<button class="nav-pill" onclick="showPage('ai',this)">AI Chat</button>
</div>
</nav>
